# 外部 Nginx 反向代理配置（可选，用于生产环境）
# 将此配置放在宿主机 Nginx 中，统一入口

upstream db_monitor_frontend {
    server 127.0.0.1:8080;
}

upstream db_monitor_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name monitor.example.com;

    # 强制 HTTPS（生产环境）
    # return 301 https://$host$request_uri;

    # 前端静态资源
    location / {
        proxy_pass http://db_monitor_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API 代理
    location /api/ {
        proxy_pass http://db_monitor_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://db_monitor_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
